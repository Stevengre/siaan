name: siaan allowlist drift

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/siaan-security.yml"
      - "WORKFLOW.md"
      - "elixir/WORKFLOW.md"
      - "elixir/lib/mix/tasks/siaan.install.ex"
      - "elixir/lib/symphony_elixir/install/**"
      - "elixir/lib/symphony_elixir/config.ex"
      - "elixir/lib/symphony_elixir/workflow.ex"
      - ".github/workflows/siaan-allowlist-drift.yml"
      - ".github/scripts/siaan_allowlist_drift.rb"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted base workflow code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Download PR config files without executing PR code
        uses: actions/github-script@v7
        env:
          TARGET_DIR: ${{ runner.temp }}/siaan-drift-repo
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const targetDir = process.env.TARGET_DIR;
            const files = [".github/siaan-security.yml", "WORKFLOW.md", "elixir/WORKFLOW.md"];

            fs.rmSync(targetDir, { recursive: true, force: true });

            for (const relativePath of files) {
              const outputPath = path.join(targetDir, relativePath);
              fs.mkdirSync(path.dirname(outputPath), { recursive: true });

              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: relativePath,
                  ref
                });

                if (Array.isArray(response.data) || response.data.type !== "file") {
                  continue;
                }

                const content =
                  response.data.encoding === "base64"
                    ? Buffer.from(response.data.content, "base64").toString("utf8")
                    : response.data.content;

                fs.writeFileSync(outputPath, content);
              } catch (error) {
                if (error.status === 404) {
                  continue;
                }

                throw error;
              }
            }

      - name: Evaluate allowlist consistency
        id: drift
        shell: bash
        run: |
          repo_root="${RUNNER_TEMP}/siaan-drift-repo"
          mkdir -p "$repo_root"

          ruby .github/scripts/siaan_allowlist_drift.rb --repo-root "$repo_root" --format json > drift.json
          ruby .github/scripts/siaan_allowlist_drift.rb --repo-root "$repo_root" --format markdown > drift_comment.md

          ruby <<'RUBY'
          require "json"

          data = JSON.parse(File.read("drift.json"))

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |file|
            file.puts("status=#{data.fetch("status")}")
            file.puts("summary=#{data.fetch("summary").gsub("\n", " ")}")
          end
          RUBY

      - name: Annotate workflow summary
        if: ${{ steps.drift.outputs.status == 'warn' }}
        run: echo "::warning::${{ steps.drift.outputs.summary }}"

      - name: Update PR drift comment
        uses: actions/github-script@v7
        env:
          DRIFT_STATUS: ${{ steps.drift.outputs.status }}
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- siaan-allowlist-drift -->";
            const issueNumber = context.payload.pull_request.number;
            const status = process.env.DRIFT_STATUS;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (status === "ok") {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id
                });
              }

              return;
            }

            const body = `${marker}\n${fs.readFileSync("drift_comment.md", "utf8").trim()}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body
              });
            }
